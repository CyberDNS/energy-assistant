# Publish container images to GHCR on every push to main and on version tags.
#
# Channel mapping:
#   push to main            → :dev  + :sha-<short-sha>
#   prerelease tag (v*-*)   → :edge + :<full-tag>
#   stable tag (vX.Y.Z)     → :latest + :<full-tag>
#
# Images are published to:
#   ghcr.io/cyberdns/energy-assistant

name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cyberdns/energy-assistant

jobs:
  build-and-push:
    name: Build and push (${{ matrix.platform }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU enables cross-platform builds on the amd64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine channel and image tags from the git ref
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # push to main → :dev + short SHA
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            # prerelease tag (v*-*) → :edge + :<tag>
            type=raw,value=edge,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-') }}
            # stable tag (vX.Y.Z) → :latest + :<tag>
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=Energy Assistant
            org.opencontainers.image.description=Open-source, vendor-neutral energy management platform
            org.opencontainers.image.vendor=CyberDNS

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || matrix.platform == 'linux/arm64' && 'arm64' || 'armv7' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-platform digests into a single multi-arch manifest
  merge-manifest:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=Energy Assistant
            org.opencontainers.image.description=Open-source, vendor-neutral energy management platform
            org.opencontainers.image.vendor=CyberDNS

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s " *)
        working-directory: /tmp/digests
